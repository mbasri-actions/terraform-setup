name: 'Terraform Setup'
description: 'Composite GitHub Action for Terraform operations — setup, init, and common CI tasks'

inputs:
  working-directory:
    description: 'The working directory containing Terraform files'
    required: true
    default: '.'

  environment:
    description: 'The Terraform Cloud workspace name'
    required: true

  github-token:
    description: 'GitHub token for accessing private modules'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v4

    - name: Configure git for private modules
      shell: bash
      run: git config --global url."https://x-access-token:${{ inputs.github-token }}@github.com/".insteadOf "https://github.com/"

    - name: Terraform Format
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: terraform fmt -check -recursive

    - name: Terraform Init
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: terraform init
      env:
        TF_WORKSPACE: ${{ inputs.environment }}

    - name: Terraform Validate
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: terraform validate
